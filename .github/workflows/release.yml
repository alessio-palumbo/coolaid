name: Release Build

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  BIN_NAME: coolaid

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set shared build variables
        run: |
          echo "VERSION=$(git describe --tags --always || echo dev)" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build Linux
        run: |
          mkdir -p dist
          FOLDER="coolaid-linux-${{ matrix.arch }}"
          OUT="dist/$FOLDER"

          mkdir -p "$OUT"

          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -o "$OUT/$BIN_NAME" \
            -ldflags "-s -w \
            -X github.com/alessio-palumbo/coolaid/internal/version.Version=$VERSION \
            -X github.com/alessio-palumbo/coolaid/internal/version.Commit=$COMMIT \
            -X github.com/alessio-palumbo/coolaid/internal/version.BuildTime=$BUILD_TIME" \
            ./cmd/ai

          cp README.md LICENSE "$OUT/"
          echo "$VERSION" > "$OUT/VERSION"

          cd dist
          zip -r "$FOLDER.zip" "$FOLDER"

      - uses: actions/upload-artifact@v4
        with:
          name: coolaid-linux-${{ matrix.arch }}
          path: dist/*.zip


  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set shared build variables
        run: |
          echo "VERSION=$(git describe --tags --always || echo dev)" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build macOS
        run: |
          mkdir -p dist
          FOLDER="coolaid-darwin-${{ matrix.arch }}"
          OUT="dist/$FOLDER"

          mkdir -p "$OUT"

          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.arch }} \
          go build -o "$OUT/$BIN_NAME" \
            -ldflags "-s -w \
            -X github.com/alessio-palumbo/coolaid/internal/version.Version=$VERSION \
            -X github.com/alessio-palumbo/coolaid/internal/version.Commit=$COMMIT \
            -X github.com/alessio-palumbo/coolaid/internal/version.BuildTime=$BUILD_TIME" \
            ./cmd/ai

          cp README.md LICENSE "$OUT/"
          echo "$VERSION" > "$OUT/VERSION"

          cd dist
          ditto -c -k --sequesterRsrc "$FOLDER" "$FOLDER.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: coolaid-darwin-${{ matrix.arch }}
          path: dist/*.zip


  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~\go\pkg\mod
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set shared build variables
        shell: bash
        run: |
          echo "VERSION=$(git describe --tags --always || echo dev)" >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build Windows
        shell: pwsh
        run: |
          $OutDir = "dist\coolaid-windows-amd64"
          New-Item -ItemType Directory -Force -Path $OutDir | Out-Null

          go build -o ".\coolaid.exe" `
            -ldflags "-s -w `
            -X github.com/alessio-palumbo/coolaid/internal/version.Version=$env:VERSION `
            -X github.com/alessio-palumbo/coolaid/internal/version.Commit=$env:COMMIT `
            -X github.com/alessio-palumbo/coolaid/internal/version.BuildTime=$env:BUILD_TIME" `
            .\cmd\ai

          Move-Item -Force ".\coolaid.exe" $OutDir
          Copy-Item README.md, LICENSE $OutDir

          Set-Content "$OutDir\VERSION" $env:VERSION

          $Zip = "dist\coolaid-windows-amd64.zip"
          if (Test-Path $Zip) { Remove-Item $Zip }

          Compress-Archive -Path "$OutDir\*" -DestinationPath $Zip

      - uses: actions/upload-artifact@v4
        with:
          name: coolaid-windows-amd64
          path: dist/*


  release:
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
